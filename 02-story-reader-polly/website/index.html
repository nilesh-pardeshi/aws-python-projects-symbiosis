<!DOCTYPE html>
<html>

<head>

    <title>AWS Story Reader</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>AWS Story Reader</h1>

    <input type="text" id="title" placeholder="Story Title">

    <br><br>

    <textarea id="story" rows="8" cols="60" placeholder="Write Story Here"></textarea>

    <br><br>

    <button onclick="uploadStory()">
        Upload Story
    </button>

    <hr>

    <h2>Story Library</h2>

    <div id="stories"></div>

    <script src="script.js"></script>

</body>

</html>
