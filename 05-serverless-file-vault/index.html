<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>S3 File Vault | Upload & Fetch</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0a0a14;
    --card:    #12121f;
    --border:  rgba(99,102,241,0.18);
    --accent:  #6366f1;
    --accent2: #a78bfa;
    --green:   #34d399;
    --red:     #f87171;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --mono:    'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 50px 20px;
  }
  .container { max-width: 720px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--muted); font-size: 0.95rem; margin-top: 8px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .card h2 {
    font-size: 1.05rem;
    color: #fff;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 14px;
  }

  input[type="text"], input[type="file"] {
    width: 100%;
    background: #0d0d1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  input[type="file"] { padding: 10px 14px; cursor: pointer; }

  button {
    margin-top: 20px;
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 13px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px rgba(99,102,241,0.25);
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(99,102,241,0.4); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Status box */
  .status {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    display: none;
  }
  .status.show { display: block; }
  .status.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
  .status.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
  .status.loading { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); color: var(--accent2); }

  /* File content preview */
  .preview {
    margin-top: 14px;
    background: #0d0d1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: none;
  }
  .preview.show { display: block; }
  .preview .label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .preview pre {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 240px;
    overflow-y: auto;
  }
  .preview img { max-width: 100%; border-radius: 8px; display: block; }
  .preview iframe { width: 100%; height: 400px; border: none; border-radius: 8px; }

  footer {
    text-align: center;
    margin-top: 30px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(99,102,241,0.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🗂️ S3 File Vault</h1>
    <p>Upload or fetch files — powered by API Gateway + Lambda + S3</p>
  </header>

  <!-- UPLOAD CARD -->
  <div class="card">
    <h2>⬆️ Upload a file</h2>
    <label>Choose file (.txt, .pdf, .jpg, .png)</label>
    <input type="file" id="uploadFile" accept=".txt,.pdf,.jpg,.jpeg,.png,.json"/>
    <button onclick="uploadFile()" id="uploadBtn">Upload to S3</button>
    <div class="status" id="uploadStatus"></div>
  </div>

  <!-- FETCH CARD -->
  <div class="card">
    <h2>⬇️ Fetch a file</h2>
    <label>Filename (e.g. notes.txt, photo.jpg)</label>
    <input type="text" id="fetchFilename" placeholder="notes.txt"/>
    <button onclick="fetchFile()" id="fetchBtn">Fetch from S3</button>
    <div class="status" id="fetchStatus"></div>
    <div class="preview" id="fetchPreview">
      <div class="label">File content</div>
      <div id="fetchPreviewBody"></div>
    </div>
  </div>

  <footer>
    Logs every request's time, IP, file type &amp; content to CloudWatch
  </footer>
</div>

<script>
  // ─────────────────────────────────────────────
  // UPDATE THIS with your API Gateway invoke URL
  // ─────────────────────────────────────────────
  const API_BASE = "https://orcdh4i2l1.execute-api.ap-south-1.amazonaws.com";

  function showStatus(el, type, message) {
    el.className = "status show " + type;
    el.innerHTML = message;
  }

  async function uploadFile() {
    const fileInput = document.getElementById("uploadFile");
    const statusEl  = document.getElementById("uploadStatus");
    const btn       = document.getElementById("uploadBtn");

    if (!fileInput.files.length) {
      showStatus(statusEl, "error", "❌ Please choose a file first");
      return;
    }

    const file = fileInput.files[0];
    btn.disabled = true;
    showStatus(statusEl, "loading", '<span class="spinner"></span> Uploading...');

    const reader = new FileReader();
    reader.onload = async function () {
      const base64Content = reader.result.split(",")[1];

      try {
        const res = await fetch(`${API_BASE}/upload`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            filename: file.name,
            content: base64Content
          })
        });
        const data = await res.json();

        if (res.ok) {
          showStatus(statusEl, "success", `✅ ${data.message}`);
        } else {
          showStatus(statusEl, "error", `❌ ${data.error || "Upload failed"}`);
        }
      } catch (err) {
        showStatus(statusEl, "error", `❌ Network error: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    };
    reader.readAsDataURL(file);
  }

  async function fetchFile() {
    const filenameInput = document.getElementById("fetchFilename");
    const statusEl  = document.getElementById("fetchStatus");
    const previewEl = document.getElementById("fetchPreview");
    const previewBody = document.getElementById("fetchPreviewBody");
    const btn = document.getElementById("fetchBtn");

    const filename = filenameInput.value.trim();
    if (!filename) {
      showStatus(statusEl, "error", "❌ Please enter a filename");
      return;
    }

    btn.disabled = true;
    previewEl.classList.remove("show");
    showStatus(statusEl, "loading", '<span class="spinner"></span> Fetching...');

    try {
      const res = await fetch(`${API_BASE}/fetch?filename=${encodeURIComponent(filename)}`);
      const data = await res.json();

      if (res.ok) {
        showStatus(statusEl, "success", `✅ ${data.message}`);

        // Show content preview based on file type
        previewBody.innerHTML = "";
        if (data.is_text) {
          const pre = document.createElement("pre");
          pre.textContent = data.text_preview;
          previewBody.appendChild(pre);
        } else if (data.file_type.startsWith("image/")) {
          const img = document.createElement("img");
          img.src = `data:${data.file_type};base64,${data.content_base64}`;
          previewBody.appendChild(img);
        } else if (data.file_type === "application/pdf") {
          const iframe = document.createElement("iframe");
          iframe.src = `data:application/pdf;base64,${data.content_base64}`;
          previewBody.appendChild(iframe);
        } else {
          previewBody.innerHTML = `<pre>[Binary file: ${data.file_type}]</pre>`;
        }
        previewEl.classList.add("show");
      } else {
        showStatus(statusEl, "error", `❌ ${data.error || "Fetch failed"}`);
      }
    } catch (err) {
      showStatus(statusEl, "error", `❌ Network error: ${err.message}`);
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
